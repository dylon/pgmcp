[package]
name = "pgmcp"
version = "0.1.0"
edition = "2024"
description = "PostgreSQL + pgvector MCP File Indexer for Claude Code"
license = "MIT"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["rt"] }

# MCP server
rmcp = { version = "1.1", features = ["server", "transport-io", "transport-streamable-http-server"] }
schemars = "1.0"

# Database
sqlx = { version = "0.8", features = ["runtime-tokio", "tls-rustls", "postgres", "chrono"] }
pgvector = { version = "0.4", features = ["sqlx"] }

# Embeddings
fastembed = "4"

# Filesystem
notify = "7"
ignore = "0.4"

# Concurrency
crossbeam-channel = "0.5"
parking_lot = "0.12"
dashmap = "6"
arc-swap = "1"
num_cpus = "1"

# Hashing
xxhash-rust = { version = "0.8", features = ["xxh3"] }

# Configuration
toml = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# CLI
clap = { version = "4", features = ["derive"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-appender = "0.2"

# Metrics
prometheus = "0.13"
axum = "0.8"

# Systemd
sd-notify = "0.4"

# Utilities
chrono = { version = "0.4", features = ["serde"] }
dirs = "6"
thiserror = "2"
anyhow = "1"
regex = "1"
libc = "0.2"

[dev-dependencies]
proptest = "1"
tokio-test = "0.4"
tempfile = "3"
assert_cmd = "2"
predicates = "3"
testcontainers = "0.23"
testcontainers-modules = { version = "0.11", features = ["postgres"] }

[[test]]
name = "integration"
path = "tests/integration.rs"

[[test]]
name = "mcp_protocol"
path = "tests/mcp_protocol.rs"
