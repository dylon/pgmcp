\* TLC model config for A2aMailboxBoundary.tla
\* Request + delivery boundary for a2a_send_message / a2a_inbox: non-blank trimmed
\* body, closed MessageKind vocab (default "message"), fail-closed to_project /
\* inbox project filter (duplicate -> rejected), at-least-one address, recipient-
\* keyed read receipts, and at-most-once delivery per recipient per channel.
SPECIFICATION Spec
INVARIANTS
    TypeOK
    SendRequiresBody
    StoredKindClosedVocab
    KindDefaultsToMessage
    InvalidKindRejects
    ToProjectFailClosed
    SendMustAddress
    InboxMustAddress
    InboxProjectFilterFailClosed
    ReceiptKeyedToRecipient
    DeliveredAtMostOncePerRecipient
    RejectedRequestsInert
CHECK_DEADLOCK FALSE
