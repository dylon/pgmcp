\* TLC model config for CfsmNetwork.tla (ADR-009 Deliberation CFSM network).
\* Bounded MaxRounds; full state-space exploration.
SPECIFICATION Spec
CONSTANTS
    MaxRounds = 2
INVARIANTS
    Invariants
    DeadlockFreedom
PROPERTIES
    EventualTermination
\* AllDone (all three machines terminal) is a legitimate end state, not a bug;
\* suppress TLC's default "no enabled Next" deadlock report. DeadlockFreedom is
\* asserted explicitly above, restricted to non-terminal states. Same rationale
\* as CronStateMachine.cfg.
CHECK_DEADLOCK FALSE
