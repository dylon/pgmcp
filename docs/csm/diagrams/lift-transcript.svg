spacing" textLength="290.5942" x="656.7969" y="214.1004">(derive `converged` from a Reflector "CONVERGED")</text><rect fill="#E0E7FF" height="36.3441" rx="12.5" ry="12.5" style="stroke:#3730A3;stroke-width:0.5;" width="117.2127" x="743.4877" y="247.6164"/><text fill="#000000" font-family="Inter" font-size="12" lengthAdjust="spacing" textLength="97.2127" x="753.4877" y="270.4445">match ProtocolId</text><line style="stroke:#181818;stroke-width:1.5;" x1="150.8189" x2="1137.5575" y1="303.9605" y2="303.9605"/><rect fill="#E0E7FF" height="52.6882" rx="12.5" ry="12.5" style="stroke:#3730A3;stroke-width:0.5;" width="269.6378" x="16" y="332.1326"/><text fill="#000000" font-family="Inter" font-size="12" lengthAdjust="spacing" textLength="249.6378" x="26" y="354.9607">Sequential / Mixture / Distillation / Recursive</text><text fill="#000000" font-family="Inter" font-size="12" lengthAdjust="spacing" textLength="245.8296" x="26" y="371.3048">&#8594; synthesize O&#8594;W:req . W&#8594;O:resp per turn</text><path d="M658.9293,326.9177 L658.9293,354.4767 L638.9293,358.4767 L658.9293,362.4767 L658.9293,390.0357 A0,0 0 0 0 658.9293,390.0357 L974.3131,390.0357 A0,0 0 0 0 974.3131,390.0357 L974.3131,336.9177 L964.3131,326.9177 L658.9293,326.9177 A0,0 0 0 0 658.9293,326.9177" fill="#FEE2E2" style="stroke:#181818;stroke-width:0.5;"/><path d="M964.3131,326.9177 L964.3131,336.9177 L974.3131,336.9177 L964.3131,326.9177" fill="#FEE2E2" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="294.3838" x="664.9293" y="345.8147">the lifted trace ends early &#8658; check_conformance</text><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="264.1602" x="664.9293" y="363.5207">reports Incomplete{T} &#8212; the real spec/impl</text><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="250.8742" x="664.9293" y="381.2267">divergence the observer exists to surface</text><rect fill="#E0E7FF" height="69.0323" rx="12.5" ry="12.5" style="stroke:#3730A3;stroke-width:0.5;" width="343.2915" x="295.6378" y="323.9605"/><text fill="#000000" font-family="Inter" font-size="12" lengthAdjust="spacing" textLength="69.6605" x="305.6378" y="346.7886">Deliberation</text><text fill="#000000" font-family="Inter" font-size="12" lengthAdjust="spacing" textLength="322.0662" x="305.6378" y="363.1328">&#8594; on `converged`, emit O&#8594;R:reflect_req . R&#8594;O:converged</text><text fill="#000000" font-family="Inter" font-size="12" lengthAdjust="spacing" textLength="323.2915" x="305.6378" y="379.4769">then STOP (text impl omits the final O&#8594;T:finish.T&#8594;O:final)</text><path d="M1310.8018,326.9177 L1310.8018,354.4767 L1290.8018,358.4767 L1310.8018,362.4767 L1310.8018,390.0357 A0,0 0 0 0 1310.8018,390.0357 L1588.188,390.0357 A0,0 0 0 0 1588.188,390.0357 L1588.188,336.9177 L1578.188,326.9177 L1310.8018,326.9177 A0,0 0 0 0 1310.8018,326.9177" fill="#EDE9FE" style="stroke:#181818;stroke-width:0.5;"/><path d="M1578.188,326.9177 L1578.188,336.9177 L1588.188,336.9177 L1578.188,326.9177" fill="#EDE9FE" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="256.3862" x="1316.8018" y="345.8147">Call/Return boundaries are &#949;-moves taken</text><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="248.9488" x="1316.8018" y="363.5207">by replay_to_configs &#8658; Dyck-balanced by</text><text fill="#000000" font-family="Inter" font-size="13" lengthAdjust="spacing" textLength="76.6481" x="1316.8018" y="381.2267">construction</text><rect fill="#E0E7FF" height="52.6882" rx="12.5" ry="12.5" style="stroke:#3730A3;stroke-width:0.5;" width="306.4887" x="984.3131" y="332.1326"/><text fill="#000000" font-family="Inter" font-size="12" lengthAdjust="spacing" textLength="65.7845" x="994.3131" y="354.9607">RecursiveCf</text><text fill="#