  "index_stats",
  "mandate_context",
  "memory_unified_search",
  "memory_semantic_search",
  "memory_create_entities",
  "a2a_send_task",
  "a2a_pattern_sequential",
  "a2a_pattern_mixture",
  "a2a_fleet_view",
  "csm_synthesize_protocol",
  "csm_validate_run",
  "csm_protocol_plan",
  "crucible_trace_event",
  "crucible_trace_get",
  "crucible_trace_timeline",
  "crucible_trace_replay",
  "crucible_trace_reconcile",
  "crucible_trace_why",
  "crucible_trace_audit",
