# CUDA host compiler pin. GCC 16+ <functional> uses C++23 explicit-object-
# parameter ("this Self&& self") syntax that nvcc 12.x cannot parse, so the
# candle-kernels build (via cudaforge -> nvcc moe_wmma*.cu) fails against
# the system g++. We pin to g++-14, the highest CUDA-12-supported host
# compiler. `force = true` is REQUIRED: Cargo's [env] is non-forcing by
# default, and a developer-exported NVCC_CCBIN (e.g. /usr/bin/g++ from a
# different repo's tooling) would otherwise silently shadow this value and
# resurrect the build break. Do not remove without first verifying that
# every transitive .cu compile succeeds against the default host g++.
#
# CUDA_COMPUTE_CAP is also forced for symmetry: pgmcp's own build.rs
# hardcodes compute_89 (RTX 4060 Ti Ada Lovelace); a stale value in a
# developer shell would silently mis-target candle's kernels while pgmcp's
# own PTX stays at 89.
[env]
NVCC_CCBIN = { value = "g++-14", force = true }
CUDA_COMPUTE_CAP = { value = "89", force = true }

# CUDA toolkit version pin for cudarc. The system toolkit is CUDA 13.3
# (nvcc V13.3.x), but cudarc's build-system version detection panics on any
# minor it doesn't enumerate: cudarc 0.19.4 (pgmcp + candle-core) tops out at
# 13.2, and ug-cuda's transitive cudarc 0.17.8 tops out at 13.0. `13000`
# (CUDA 13.0) is the ONLY value BOTH crates accept. CUDA preserves
# runtime-library ABI across a major version's minors and cudarc dynamic-links
# the runtime (`libcudart`/`libcublas`/`libcublasLt` `.so.13`), so building the
# 13.0 bindings against the installed 13.3 libraries is safe. `detect_version_
# from_env` is checked before nvcc detection, so this fully bypasses the probe.
# `force = true` for the same shadowing reason as NVCC_CCBIN. Without this a
# cold build panics: "Unsupported cuda toolkit version: `13.3`". Remove (or
# raise) once both cudarc 0.19.4 and 0.17.8 enumerate 13.3.
CUDARC_CUDA_VERSION = { value = "13000", force = true }

# libgrammstein (transitive: `gxhash 3.x`) compile-errors out without
# AES-NI and SSE2 intrinsics — the crate has no software fallback. The
# user's hardware is x86_64 with AES-NI; setting `+aes,+sse2` here
# avoids `RUSTFLAGS=...` ceremony at every build site. `+aes,+sse2` is
# preferred over `target-cpu=native` because it locks down only what is
# strictly required and avoids baking host-CPU-specific tuning into the
# build (which could surprise on a CI runner with different
# microarchitecture).
[build]
rustflags = ["-C", "target-feature=+aes,+sse2"]

[alias]
# Convenience wrappers for individual verification gates. The full verify
# sequence (including formatting, CPU-only build, and GPU smokes) lives in
# `scripts/verify.sh` and is enforced by the pre-push hook at `.githooks/pre-push`.
# Enable the hook per clone with:  git config core.hooksPath .githooks
verify-build  = "build --all-targets"
verify-clippy = "clippy --all-targets -- -D warnings"
verify-test   = "test --release --bin pgmcp"
smoke         = "run --release --example gpu_smoke"
